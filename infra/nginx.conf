# Serve o build estático do Talkhub web com fallback de SPA.
# TLS e domínio são tratados pelo Caddy do 4q (reverse_proxy talkhub-web:80).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Assets com hash podem ter cache longo.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Rotas client-side caem no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
