name: CD — Build & Deploy (Talkhub)

# Builda as imagens arm64 do Talkhub (server + web estático), publica no GHCR
# e dispara o deploy na infra do 4q (repository_dispatch). A instância OCI é
# ARM (VM.Standard.A1.Flex), por isso as imagens são linux/arm64.

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: talkhub-cd
  cancel-in-progress: false

env:
  # URLs públicas embutidas no bundle do web (build-time).
  VITE_API_URL: https://talkhub-api.kod3.com.br
  VITE_SERVER_URL: wss://talkhub-api.kod3.com.br

jobs:
  build-server:
    name: Build Server Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/talkhub-server
          tags: |
            type=sha,prefix=
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.server
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/talkhub-web
          tags: |
            type=sha,prefix=
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.web
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
            VITE_SERVER_URL=${{ env.VITE_SERVER_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-deploy:
    name: Trigger 4q Infra Deploy
    needs: [build-server, build-web]
    runs-on: ubuntu-latest
    steps:
      # Dispara o workflow cd-talkhub.yml no repo da infra (victobonetti/4q).
      # Requer um PAT (secret DEPLOY_DISPATCH_TOKEN) com escopo repo no 4q.
      - name: Dispatch deploy to 4q
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/4q
          event-type: talkhub-deploy
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
